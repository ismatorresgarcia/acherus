# Acherus configuration file
# ==========================
# This file can be used as a minimal working example and as a reference.
#
# Installation
# ------------
# From PyPI:
#   pip install acherus
#
# From source repository:
#   git clone https://github.com/ismatorresgarcia/acherus.git
#   cd acherus
#
#   Optional (editable install for development):
#     pip install -e .
#
# Execution
# ---------
# Before running commands below, copy this file to your working directory
# (for example, repository root) and keep the name `003_water_IR_fs.toml`.
#
# Installed package:
#   acherus 003_water_IR_fs.toml
#   acherus 003_water_IR_fs.toml --output ./results/my_run
#   acherus-monitoring --config 003_water_IR_fs.toml
#   acherus-plotting --config 003_water_IR_fs.toml --CLI args...
#
# Cloned repository (approach A):
#   python -m acherus 003_water_IR_fs.toml
#   python -m acherus 003_water_IR_fs.toml --output ./results/my_run
#   python -m acherus.monitoring --config 003_water_IR_fs.toml
#   python -m acherus.plotting --config 003_water_IR_fs.toml --CLI args...
#
# Cloned repository after editable install (approach B):
#   acherus 003_water_IR_fs.toml
#   acherus 003_water_IR_fs.toml --output ./results/my_run
#   acherus-monitoring --config 003_water_IR_fs.toml
#   acherus-plotting --config 003_water_IR_fs.toml --CLI args...
#
# Notes
# -----
# - If both are provided, --output overrides data_output_path.
# - Plotting/monitoring use their own CLI arguments and may read defaults from this file.
# - Use SI units unless explicitly noted.

# Optional output path for simulation data.
data_output_path = "./results/example_run"

# Optional output path for generated figures.
# If omitted, plotting/monitoring default to <data_output_path>/figures.
figure_output_path = "./results/example_figures"

# Water femtosecond example
# ======================
# This is an example of femtosecond filamentation in water at 800 nm.

propagation_solver = "FCN"   # "FCN" | "SSCN"
computing_backend = "CPU"    # "CPU" | "GPU" (not supported yet)

[medium_parameters.WATER]
nonlinear_index = 4.1e-20   # Kerr index
energy_gap = 6.5         # ionization energy (in eV)
collision_time = 3e-15    # electron collision time
neutral_density = 6.68e28    # medium neutral atom density
initial_density = 1e9       # initial electron density
# recombination_rate = 1e-20      # Optional: electron recombination rate (default: None)
# raman_partition = 0.5             # Optional: partition parameter (default: None)
# raman_response_time = 70e-15      # Optional: damping time (default: None)
# raman_rotational_time = 62.5e-15  # Optional: fundamental time (default: None)

[grid_parameters.SPACE]
nodes = 7501
space_min = 0.0
space_max = 750e-6

[grid_parameters.AXIS]
nodes = 30001
axis_min = 0.0
axis_max = 3e-2
snapshots = 5

[grid_parameters.TIME]
nodes = 512
time_min = -700e-15
time_max = 700e-15

# Optional PML block.
# [grid_parameters.PML]
# pml_damping = 10.0  # PML max. damping coefficient
# pml_width = 0.2     # PML thickness (in space_max units)

[pulse_parameters.GAUSSIAN]
wavelength = 800e-9
waist = 75e-6
duration = 130e-15
energy = 2.2e-6
# focal_length = 2.0  # Optional (default: None)
# chirp = 0.890       # Optional (default: None)
# gauss_order = 3     # Optional (default: 2)

# Choose one solver block under [density_solver.*]
# Available adaptive options: RK23, RK45, DOP853
[density_solver.RK45]
rtol = 1e-9    # Optional (default: 1e-3)
# atol = 1e-6  # Optional (default: 1e-6)

# Choose one model block under [ionization_model.*]
# Available options: KELDYSH, MPI
# [ionization_model.KELDYSH]
# intensity_range = [1e-6, 1e18]  # Optional: interpolation interval (default: [1e-1, 1e18])
# num_points = 200000              # Optional: interpolation grid size (default: 10000)
# tolerance = 1e-3              # Optional: series convergence tolerance (default: 1e-3)
# max_iterations = 250          # Optional: series max iterations (default: 250)
# reduced_mass = 0.5            # Optional: only for condensed media

# MPI option:
[ionization_model.MPI]
cross_section = 1.2e-72  # Required
intensity_range = [1e-6, 1e18]  # Optional: interpolation interval (default: [1e-1, 1e18])
num_points = 200000              # Optional: interpolation grid size (default: 10000)
# Optional fields: same as in KELDYSH

# Choose one model block under [dispersion.*]
# Available options: FULL, PARTIAL
# [dispersion.FULL]

# Partial option:
[dispersion.PARTIAL]
# Provide coefficients for Taylor expansion of k(w) at central laser frequency
k2 = 248e-28  # Required
k3 = 270e-43  # Optional
#k4 = 1e-58  # Optional
#k5 = 5e-74  # Optional
