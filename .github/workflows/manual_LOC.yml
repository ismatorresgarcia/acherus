name: LoC Badge

on:
  workflow_dispatch:

jobs:
  update-loc-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tokei
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo
          cargo install tokei

      - name: Count Python LoC in acherus/
        id: tokei
        run: |
          cd acherus
          TOKEI_OUT=$(tokei acherus/ --types Python --output json)
          PY_LOC=$(echo "$TOKEI_OUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('Python',{}).get('code',0))")
          if [ "$PY_LOC" -ge 1000 ]; then
            PY_LOC_BADGE=$(awk "BEGIN {printf \"%.1fk\", $PY_LOC/1000}")
          else
            PY_LOC_BADGE="$PY_LOC"
          fi
          echo "PY_LOC_BADGE=$PY_LOC_BADGE" >> $GITHUB_ENV

      - name: Download badge
        run: |
          cd acherus
          curl -L -o /tmp/badge.svg "https://img.shields.io/badge/Lines_of_Code-${PY_LOC_BADGE}-blue"

      - name: Push badge to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          cp /tmp/badge.svg ./badge.svg
          git add badge.svg
          git commit -m "Update LoC badge [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
