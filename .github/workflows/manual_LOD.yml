name: LoD Badge

on:
  workflow_dispatch:

jobs:
  update-lod-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tokei
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo
          cargo install tokei

      - name: Count Markdown LoD in repository
        run: |
          TOKEI_OUT=$($HOME/.cargo/bin/tokei . --types Markdown --output json)
          MD_LOC=$(echo "$TOKEI_OUT" | python -c "import sys, json; d=json.load(sys.stdin); print(d.get('Markdown',{}).get('code',0))")
          if [ "$MD_LOC" -ge 1000 ]; then
            MD_LOC_BADGE=$(awk "BEGIN {printf \"%.1fk\", $MD_LOC/1000}")
          else
            MD_LOC_BADGE="$MD_LOC"
          fi
          echo "MD_LOC_BADGE=$MD_LOC_BADGE" >> $GITHUB_ENV

      - name: Download badge from shields.io
        run: |
          curl -L -o badge-docs.svg "https://img.shields.io/badge/Lines_of_Docs-${MD_LOC_BADGE}-blue"
          cp badge-docs.svg /tmp/badge-docs.svg

      - name: Push badge to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          cp /tmp/badge-docs.svg ./badge-docs.svg
          git add badge-docs.svg
          git commit -m "Update LoD badge [skip ci]" || echo "No changes to commit"
          git push origin gh-pages